services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tip2tip
      POSTGRES_PASSWORD: tip2tip_dev
      POSTGRES_DB: tip2tip
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tip2tip"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://tip2tip:tip2tip_dev@db:5432/tip2tip
      JWT_SECRET: change-me-in-production
      UPLOAD_DIR: /data/uploads
      RUST_LOG: tip2tip_backend=debug,tower_http=debug
      CORS_ORIGIN: http://localhost:3001
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
