services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tip2tip
      POSTGRES_PASSWORD: tip2tip_dev
      POSTGRES_DB: tip2tip
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tip2tip"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://tip2tip:tip2tip_dev@db:5432/tip2tip
      JWT_SECRET: dev-secret-key-that-is-at-least-32-characters-long
      CORS_ORIGIN: http://localhost:3000
      RUST_LOG: tip2tip_backend=debug,tower_http=debug
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
